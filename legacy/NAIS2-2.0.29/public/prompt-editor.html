<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelAI Prompt Editor</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --bg-color: #080808;
    --text-color: #f1f1f1;
    --panel-bg: #1e1e1e;
    --input-bg: #2d2d2d;
    --border-color: #555;
    --button-bg: #5a5a5a;
    --button-hover-bg: #707070;
    --highlight-color: #3583d1;
    --tag-bg: #3a3d41;
    --tag-hover-bg: #4a4d51;
    --tag-selected-border: #3583d1; 
    --button-fixed-height: 25px;
    --base-font-size: 14px;
    --gap-small: 5px;
    --gap-medium: 8px;
    scrollbar-color: var(--button-bg) var(--panel-bg);
    scrollbar-width: thin;
}
body {
    font-family: 'Malgun Gothic', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: var(--gap-medium);
    display: flex;
    flex-direction: column;
    height: 100vh;
    box-sizing: border-box;
    font-size: var(--base-font-size);
    user-select: none; 
}
.main-content {
    display: flex;
    flex-direction: row;
    gap: var(--gap-medium);
    flex-grow: 1;
    min-height: 0;
    overflow: hidden;
}
.left-column, .right-column {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    min-height: 0;
}
.panel {
    background-color: var(--panel-bg);
    border: none;
    border-radius: 4px;
    padding: var(--gap-medium);
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
}
.tab-navigation {
    display: flex;
    align-items: center; 
    position: relative;
    z-index: 1;
    margin-bottom: 0;
}
.tab-button {
	height: 33px; 
	line-height: 35px; 
	padding: 0 15px; 
	cursor: pointer;
	background-color: #1a1a1a;
	color: var(--text-color);
	border: none;
	border-radius: 4px 4px 0 0;
	margin-right: 2px; 
	font-size: var(--base-font-size);
	opacity: 0.5;
	white-space: nowrap;
}
.left-column .tab-button,
.right-column .tab-button {
	min-width: 60px;
	max-width: 200px;
	overflow: hidden; 
	box-sizing: border-box;
	justify-content: flex-start;
}
.left-column .tab-button .tab-button-text,
.right-column .tab-button .tab-button-text {
	width: 100%; 
	display: block; 
	white-space: nowrap; 
	overflow: hidden; 
	text-overflow: ellipsis; 
}
.tab-button:hover { opacity: 1; background-color: #444444; }
.tab-content-wrapper { flex-grow: 1; min-height: 0; position: relative; display: flex; }
.tab-pane.panel { display: none; flex-grow: 1; border-radius: 0 8px 8px 8px; }
.tab-pane.panel.active { display: flex; }
.prompt-editors-container {
    display: flex;
    flex-direction: column; 
    gap: var(--gap-medium); 
    flex-grow: 1;
    overflow-y: auto;
}
.prompt-editor {
	display: flex;
	flex-wrap: wrap;
	align-content: flex-start;
	cursor: text;
	overflow-y: auto;
	padding: 0;
	background-color: transparent; 
	min-height: 26px;
	position: relative;
	outline: none;
}
body.monospace-tags .tag,
body.monospace-tags .tag-editor-input {
	font-family: Consolas, Monaco, 'Courier New', monospace;
	font-size: var(--base-font-size); 
}
.tag {
    background-color: transparent;
    padding: 4px 8px;
    cursor: pointer;
    white-space: pre;
    user-select: none;
}
.tag:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2); 
}
.tag.selected {
	background-color: var(--tag-selected-border);
}
.tag.duplicate-tag {
	border-bottom: 1px solid #e53935;
	padding-bottom: 3px;
	cursor: pointer;
}
.tag.selected.draggable {
	cursor: grab;
}
.prompt-editor:focus-within .tag.last-selected {
	position: relative; 
	box-shadow: inset 0 0 0 2px #ffffff; 
	z-index: 10; 
}
.prompt-editor:focus-within .tag.last-selected:hover {
	box-shadow: inset 0 0 0 2px #ffffff, inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.tag.ghost { 
	opacity: 0.5;
	cursor: grabbing; 
}
.tag.placeholder {
	padding: 0;
	margin: 0;
	border: 0;
	width: 0;
	font-size: 0;
}
.tag::after {
	content: ',';
}
.tag-editor-input { 
	font: inherit;
	padding: 4px 8px;
	border: 0;
	background-color: #282c32;
	color: var(--text-color);
	box-sizing: border-box;
	position: absolute; 
	z-index: 500;     
	box-shadow: inset 0 0 0 2px var(--highlight-color); 
}
.tag-editor-input:focus { outline: none; }
#autocomplete-container {
	position: fixed; 
	z-index: 600; 
	background-color: #1d1d1d;
	box-shadow: inset 0 0 0 1px #333;
	display: none;
	min-width: 180px;
	max-width: 400px; 
}
.autocomplete-separator {
    height: 1px;
    background-color: #333; 
}
.autocomplete-item {
	padding: 2px 8px;
	color: var(--text-color); 
	cursor: pointer;
	white-space: nowrap;
	display: flex;
	justify-content: space-between;
	align-items: center;
	font-size: var(--base-font-size);
}
.autocomplete-item:hover, .autocomplete-item.active {
    background-color: #333;
}
.autocomplete-item .tag-name {
    overflow: hidden;
    text-overflow: ellipsis;
}
.autocomplete-item .tag-count {
    font-size: calc(var(--base-font-size) - 2px);
    color: #aaa;
    margin-left: 10px;
    flex-shrink: 0;
}
.autocomplete-item .tag-count:hover {
    text-decoration: underline;
    cursor: pointer; 
}
.autocomplete-item .tag-name.tag-category-0 { color: #03adff; } 
.autocomplete-item .tag-name.tag-category-1 { color: #ff8a8b; } 
.autocomplete-item .tag-name.tag-category-3 { color: #c797ff; } 
.autocomplete-item .tag-name.tag-category-4 { color: #35c64a; } 
.autocomplete-item .tag-name.tag-category-5 { color: #ead084; } 
.drop-indicator {
	position: absolute;
	display: none; 
	width: 2px;
	height: 26px;
	background-color: var(--highlight-color); 
	z-index: 1000;
	pointer-events: none; 
}
.panel-toolbar {
	display: flex;
	gap: var(--gap-small); 
	margin-bottom: var(--gap-medium); 
}
.prompt-window {
		display: flex;
		flex-direction: column;
		border-radius: 4px; 
		background-color: #282c32; 
		position: relative; 
	}
.prompt-window:focus-within {
	outline: 2px solid var(--highlight-color);
	outline-offset: -2px; 
}
.prompt-window.drag-over {
	outline: 2px dashed var(--highlight-color); 
	outline-offset: -2px; 
}
.prompt-window .drag-action-overlay {
	position: absolute;
	top: 0; left: 0; right: 0; bottom: 0;
	display: none; 
	justify-content: space-around;
	align-items: center;
	pointer-events: none;
	z-index: 201;
}
.prompt-window.drag-over .drag-action-overlay {
	display: flex; 
}
.prompt-window .drag-action-overlay > span {
	flex: 1;
	height: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
	color: var(--highlight-color);
	text-shadow: 1px 1px 2px black, 0 0 5px black;
	font-size: 16px;
	font-weight: bold;
	position: relative;
}
.prompt-window .drag-action-overlay > span.highlighted {
	color: white;
}
.prompt-window .drag-action-overlay > span.highlighted::before {
	content: '';
	position: absolute;
	top: 0; left: 0; right: 0; bottom: 0;
	background-color: var(--highlight-color);
	opacity: 0.4;
	z-index: -1;
}
.prompt-title-bar {
	display: flex;
	justify-content: flex-start;
	align-items: center;
	padding: 0;
	background-color: transparent; 
	flex-shrink: 0; 
	border-top-left-radius: 4px;  
	border-top-right-radius: 4px;
}
.prompt-title {
	flex: 0 1 auto; 
	min-width: 60px; 
	max-width: calc(100% - 150px); 
	cursor: text;
	padding: 4px 8px 4px 0; 
	outline: none;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	color: #aaa;
} 
.prompt-window:focus-within .prompt-title {
	color: var(--text-color); 
}
.prompt-title:focus {
    background-color: transparent;
}
.prompt-controls {
	display: flex;
	flex-shrink: 0;
	opacity: 0; 
	pointer-events: none; 
	margin-left: auto; 
}
.prompt-title-bar > .toggle-include-btn {
	opacity: 1; 
	pointer-events: auto; 
	background: none;
	border: none;
	color: #aaa;
	cursor: pointer;
	width: 26px;
	height: 26px;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-shrink: 0;
}
.prompt-window:focus-within .prompt-title-bar > .toggle-include-btn {
	color: var(--text-color);
}
.prompt-title-bar > .toggle-include-btn:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.prompt-window:hover .prompt-controls,
.prompt-window:focus-within .prompt-controls {
	opacity: 1;
	pointer-events: auto;
}
.prompt-controls button {
	background: none;
	border: none;
	color: #aaa;
	cursor: pointer;
	width: 26px;
	height: 26px;
	display: flex;
	align-items: center;
	justify-content: center;
}
.prompt-window:focus-within .prompt-controls button {
	color: var(--text-color); 
}
.prompt-controls button.copied {
	background-color: #35c64a; 
	color: var(--text-color) !important; 
}
.copy-all-btn.copied {
	background-color: #35c64a; 
	color: var(--text-color) !important; 
	box-shadow: none; 
}
.prompt-controls button:hover {
    box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.prompt-controls button > i,
.prompt-title-bar > .toggle-include-btn > i {
	pointer-events: none;
}
.prompt-window.excluded {
	background-color: rgba(40, 44, 50, 0.4);
	box-shadow: none; 
}
.prompt-window:not(.excluded) .toggle-include-btn i::before {
	content: "\f00c"; 
	font-weight: 900;
	color: #009be6; 
}
.prompt-window.excluded .toggle-include-btn i::before {
	content: ''; 
	display: block;
	width: 3px;      
	height: 3px;     
	background-color: currentColor; 
	border-radius: 50%; 
}
.prompt-controls .copy-prompt-btn {
	font-size: 12px; 
}
.copy-to-other-column-btn {
	font-size: 12px; 
}
.move-up-btn {
	font-size: 12px; 
}
.move-down-btn {
	font-size: 12px; 
}
delete-editor-btn {
	border-top-right-radius: 4px;
	font-size: 12px;
}
.top-right-menu-container { position: fixed; top: var(--gap-medium); right: var(--gap-medium); z-index: 1500; }
#main-menu-btn {
	padding: 0 var(--gap-medium); height: var(--button-fixed-height);
	background-color: #444; 
	color: var(--text-color);
	border: none; 
	border-radius: 4px; cursor: pointer;
	font-size: var(--base-font-size); display: inline-flex;
	align-items: center; justify-content: center;
}
#main-menu-btn:hover { box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2); }
.menu-dropdown {
	display: none; position: absolute; top: calc(100% + var(--gap-small));
	right: 0; background-color: var(--input-bg); 
	border: 1px solid #444; 
	border-radius: 4px;
	box-shadow: 0 3px 7px rgba(0,0,0,0.25); min-width: 180px; padding: var(--gap-small) 0;
}
.menu-dropdown button, .menu-dropdown .menu-item-label {
    display: block; width: 100%; padding: 8px 12px; text-align: left;
    background-color: transparent; color: var(--text-color); border: none;
    cursor: pointer; font-size: var(--base-font-size); box-sizing: border-box;
}
.menu-dropdown button:hover, .menu-dropdown .menu-item-label:hover { background-color: var(--tag-hover-bg); }
#import-tags-input-menu { display: none; }
.menu-dropdown .menu-section-header {
    padding: 8px 12px;
    font-weight: bold;
    color: var(--highlight-color);
    background-color: var(--input-bg);
    cursor: default;
}
.menu-dropdown .menu-item-label.sub-item {
    font-size: calc(var(--base-font-size) - 1px);
    padding: 3px 12px 3px 8px;
    display: flex;
    align-items: center;
    cursor: default;
}
 .menu-dropdown .menu-item-label.sub-item input[type="checkbox"] {
    margin-right: 8px;
    vertical-align: middle;
    cursor: pointer;
}
.menu-dropdown .menu-item-label.sub-item input[type="number"] {
    background-color: var(--input-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color);
    border-radius: 3px;
    padding: 2px 4px;
    margin-left: 5px;
    width: 50px;
}
.menu-dropdown .menu-item-label.sub-item .checkbox-label-text {
    cursor: pointer;
    flex-grow: 1;
}
.menu-dropdown input[type="checkbox"]:checked {
    accent-color: var(--highlight-color);
}
body ::-webkit-scrollbar { width: 10px; height: 10px; }
body ::-webkit-scrollbar-track { background: var(--input-bg); border-radius: 5px; }
body ::-webkit-scrollbar-thumb { background-color: var(--button-bg); border-radius: 5px; border: 2px solid var(--input-bg); }
body ::-webkit-scrollbar-thumb:hover { background-color: var(--button-hover-bg); }
body ::-webkit-scrollbar-corner { background: var(--input-bg); }
.add-editor-btn,
.weight-button-group > button,
.copy-all-btn {
	height: 28px; 
	padding: 0 8px; 
	background-color: #444; 
	border: none; 
	color: var(--text-color);
	border-radius: 4px;
	cursor: pointer;
	flex-shrink: 0;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	box-sizing: border-box; 
}
.add-editor-btn {
	width: 28px; 
	font-size: 12px; 
}
.add-editor-btn:hover,
.weight-button-group > button:hover,
.copy-all-btn:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.weight-btn, .remove-weight-btn {
	width: 28px; 
	font-size: 12px;
	padding: 0; 
}
.weight-button-group > button:first-child {
	border-top-left-radius: 4px;
	border-bottom-left-radius: 4px;
	margin-left: 0; 
}
.weight-button-group > button:last-child {
	border-top-right-radius: 4px;
	border-bottom-right-radius: 4px;
}
.add-editor-btn:active,
.weight-button-group > button:active,
.copy-all-btn:active,
.toolbar-button-group > button:active,
.prompt-controls button:active,
#main-menu-btn:active,
.menu-dropdown button:active,
.add-left-tab-btn:active,
.add-right-tab-btn:active, 
.tab-selector-item-controls button:active,
.tab-button:active, 
.sort-display-btn:active, 
.sort-options-btn:active, 
.sort-dropdown-menu button:active 
{
	background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, rgba(255, 255, 255, 0.1) 100%);
}
.panel-toolbar {
	display: flex;
	gap: var(--gap-small);
	margin-bottom: var(--gap-medium); 
	align-items: flex-start; 
	justify-content: space-between; 
}
.toolbar-left-group {
	display: flex;
	align-items: center;
	gap: var(--gap-small);
	flex-wrap: wrap; 
}
.toolbar-right-group {
	display: flex;
	gap: var(--gap-small);
	align-items: center;
}
.weight-button-group {
	display: flex; 
}
.toolbar-button-group {
	display: flex;
}
.toolbar-button-group > button {
	height: 28px;
	width: 28px;
	padding: 0;
	background-color: #444;
	border: none;
	color: var(--text-color);
	cursor: pointer;
	flex-shrink: 0;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	box-sizing: border-box;
	border-radius: 0;
	font-size: 12px;
}
.toolbar-button-group > button:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
	position: relative;
	z-index: 2;
}
.toolbar-button-group > button:first-child {
	border-top-left-radius: 4px;
	border-bottom-left-radius: 4px;
}
.toolbar-button-group > button:last-child {
	border-top-right-radius: 4px;
	border-bottom-right-radius: 4px;
}
.weight-button-group > button {
	border-radius: 0; 
}
.weight-button-group > button:hover {
	position: relative; 
	z-index: 2;
}
.copy-all-btn {
	min-width: 70px;    
}
.tab-item-tag-count {
	color: #aaa; 
	margin-left: 6px; 
}	
#left-tab-selector,
#right-tab-selector {
	display: none; 
	flex-grow: 1;
	border-radius: 0 8px 8px 8px; 
}
#left-tab-selector .panel-toolbar,
#right-tab-selector .panel-toolbar {
	justify-content: flex-start; 
}
.add-left-tab-btn,
.add-right-tab-btn { 
	height: 28px;
	width: 28px; 
	padding: 0;  
	background-color: #444;
	border: none;
	color: var(--text-color);
	border-radius: 4px;
	cursor: pointer;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	font-size: 14px; 
}
.add-left-tab-btn:hover,
.add-right-tab-btn:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.tab-selector-list {
	display: flex;
	flex-direction: column;
	overflow-y: auto;
	flex-grow: 1;
}
.tab-selector-item {
	padding: 0 0 0 12px; 
	background-color: transparent; 
	border-radius: 0; 
	cursor: pointer;
	display: flex;
	justify-content: space-between;
	align-items: center;
	border: none;
	border-bottom: 1px solid var(--input-bg);
	min-height: 34px; 
}
.tab-selector-item:hover {
	background-color: var(--input-bg);
}
.tab-selector-item.active-in-column {
    box-shadow: inset 2px 0 0 0 var(--highlight-color); 
}
.tab-selector-item-name {
	flex-grow: 1;
	min-width: 0;
	white-space: nowrap; 
	overflow: hidden;
	text-overflow: ellipsis; 
	margin-right: 8px; 
}
.tab-selector-item-controls {
	display: flex;     
	flex-shrink: 0;  
}
.tab-selector-item-controls button {
	background: none; border: none; color: #aaa;
	cursor: pointer; 
	visibility: hidden;
	width: 34px;        
	height: 34px;       
	display: flex;      
	align-items: center;    
	justify-content: center;
	font-size: 12px;    
}
.tab-selector-item:hover .tab-selector-item-controls button {
	visibility: visible;
}
.tab-selector-item-controls button:hover {
	background-color: rgba(255,255,255,0.1);
	color: var(--text-color);
}
.tab-list-btn {
	min-width: 40px !important; 
	max-width: 40px !important; 
	padding: 0 !important; 
	border-radius: 8px 0 0 0 !important; 
}
.main-tab-btn {
	border-radius: 0 !important; 
}
.dict-toggle-btn {
	border-radius: 0 8px 0 0 !important; 
}
.tab-navigation .tab-button {
	background-color: #1a1a1a;
	opacity: 0.5;
}
.tab-navigation .tab-button:hover {
	background-color: #444444;
	opacity: 1;
}
.left-column:not(.selector-active):not(.dictionary-active) .main-tab-btn,
.right-column:not(.selector-active):not(.dictionary-active) .main-tab-btn,
.left-column.selector-active .tab-list-btn,
.right-column.selector-active .tab-list-btn,
.left-column.dictionary-active .dict-toggle-btn,
.right-column.dictionary-active .dict-toggle-btn {
	background-color: var(--panel-bg);
	opacity: 1;
}
.left-column.selector-active .tab-button:not(.tab-list-btn):hover,
.right-column.selector-active .tab-button:not(.tab-list-btn):hover,
.left-column.dictionary-active .tab-button:not(.dict-toggle-btn):hover,
.right-column.dictionary-active .tab-button:not(.dict-toggle-btn):hover {
	background-color: #444444;
	opacity: 1;
}
.tag .tag-modifier-red    { color: #ff8a8b; } 
.tag .tag-modifier-blue   { color: #82b1ff; } 
.tag .tag-modifier-green  { color: #00e200; } 
.tag .tag-modifier-yellow { color: #ffe38f; } 
.sort-controls {
	display: flex; 
	position: relative; 
}
.sort-display-btn,
.sort-options-btn {
	height: 28px;
	padding: 0 8px;
	background-color: #444;
	border: none;
	color: var(--text-color);
	cursor: pointer;
	font-size: 13px;
}
.sort-display-btn:hover,
.sort-options-btn:hover {
	box-shadow: inset 0 0 0 15px rgba(255, 255, 255, 0.2);
}
.sort-display-btn {
	border-top-left-radius: 4px;
	border-bottom-left-radius: 4px;
	min-width: 75px; 
}
.sort-options-btn {
	border-top-right-radius: 4px;
	border-bottom-right-radius: 4px;
	border-left: 1px solid var(--border-color); 
	padding: 0 6px;
}
.sort-dropdown-menu {
	display: none; 
	position: absolute;
	top: 100%; 
	left: 0;
	background-color: var(--input-bg); 
	border: 1px solid #444; 
	border-radius: 4px;
	box-shadow: 0 3px 7px rgba(0,0,0,0.25);
	min-width: 100%; 
	z-index: 1100;
	padding: var(--gap-small) 0;
	box-sizing: border-box; 
}
.sort-dropdown-menu button {
	display: block;
	width: 100%;
	padding: 5px 10px; 
	text-align: left;
	background: none;
	border: none;
	color: var(--text-color);
	cursor: pointer;
	font-size: 13px; 
}
.sort-dropdown-menu button:hover {
	background-color: var(--tag-hover-bg);
}
.tab-search-container {
	flex-grow: 1; 
	margin-left: var(--gap-small); 
}

    class HistoryManager {
        constructor(editor) {
            this.editor = editor;
            this.undoStack = [];
            this.redoStack = [];
			this.limit = 100;
        }
        execute(command) {
            command.execute();
			if (this.undoStack.length === this.limit) {
				this.undoStack.shift(); 
			}
            this.undoStack.push(command);
            this.redoStack = []; 
            this.editor.updateDraggableState(); 
			this.editor.checkDuplicates();
            updateAllSelectors(); 
			requestSave();
        }
        undo() {
            if (this.undoStack.length === 0) return;
            const command = this.undoStack.pop();
            command.undo();
            this.redoStack.push(command);
            this.editor.updateDraggableState();
			this.editor.checkDuplicates();
            updateAllSelectors(); 
			requestSave();
        }
        redo() {
            if (this.redoStack.length === 0) return;
            const command = this.redoStack.pop();
            command.execute();
            this.undoStack.push(command);
            this.editor.updateDraggableState();
			this.editor.checkDuplicates();
            updateAllSelectors(); 
			requestSave();
        }
    }
    class Command {
        constructor(editor) { this.editor = editor; }

    class CreateTagsCommand extends Command {
        constructor(editor, tags, insertBefore, selectAfter = true) {
            super(editor);
            this.tags = Array.isArray(tags) ? tags : [tags]; 
            this.insertBefore = insertBefore;
            this.selectAfter = selectAfter;
        }
	execute() {
		this.tags.forEach(tag => this.editor.container.insertBefore(tag, this.insertBefore));
		if (this.selectAfter && this.tags.length > 0) {
			this.editor.clearSelection();
			this.tags.forEach(tag => {
				tag.classList.add('selected');
				this.editor.selectedTags.add(tag);
			});
			const firstTag = this.tags[0];
			const lastTag = this.tags[this.tags.length - 1];
			this.editor.selectionAnchor = firstTag;
			this.editor.lastSelectedTag = lastTag;
			lastTag.classList.add('last-selected');
			lastTag.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
			this.editor.updateDraggableState();
            this.editor.container.focus(); 
		}
	}
        undo() {
            const prevSibling = this.tags[0].previousElementSibling;
            this.tags.forEach(tag => tag.remove());
            this.editor.clearSelection();
            if (prevSibling && prevSibling.classList.contains('tag')) {
                 this.editor.selectTag(prevSibling, false, false);
            } else {
                 this.editor.container.focus();
            }
        }
    }
    class DeleteTagsCommand extends Command {
        constructor(editor, tagsToDelete, key) {
            super(editor);
            this.key = key; 
            this.originalSelection = Array.from(editor.selectedTags);
            this.originalLastSelected = editor.lastSelectedTag;
            this.originalAnchor = editor.selectionAnchor;
            this.deletedInfo = tagsToDelete.map(tag => ({
                tag: tag,
                nextSibling: tag.nextElementSibling
            }));
            const allTags = Array.from(this.editor.container.querySelectorAll('.tag'));
            const firstDeletedIndex = allTags.indexOf(this.deletedInfo[0].tag);
            if (this.key === 'Backspace') {
                this.tagToSelectAfter = (firstDeletedIndex > 0) ? allTags[firstDeletedIndex - 1] : null;
            } else { 
                const lastDeletedTag = this.deletedInfo[this.deletedInfo.length - 1].tag;
                this.tagToSelectAfter = lastDeletedTag.nextElementSibling;
            }
        }
        execute() {
            this.editor.clearSelection();
            this.deletedInfo.forEach(info => info.tag.remove());
            if (this.tagToSelectAfter && this.tagToSelectAfter.classList.contains('tag')) {
                this.editor.selectTag(this.tagToSelectAfter, false, false);
            } else {
                const remainingTags = Array.from(this.editor.container.querySelectorAll('.tag'));
                if (remainingTags.length > 0) {
                    const selectCandidate = (this.key === 'Delete') ? remainingTags[remainingTags.length - 1] : remainingTags[0];
                    this.editor.selectTag(selectCandidate, false, false);
                } else {
                    this.editor.container.focus();
                }
            }
        }
        undo() {
            this.editor.clearSelection();
            this.deletedInfo.slice().reverse().forEach(info => {
                this.editor.container.insertBefore(info.tag, info.nextSibling);
            });
            this.originalSelection.forEach(tag => {
                this.editor.selectedTags.add(tag);
                tag.classList.add('selected');
            });
            this.editor.lastSelectedTag = this.originalLastSelected;
            this.editor.selectionAnchor = this.originalAnchor;
            if (this.editor.lastSelectedTag) {
                this.editor.lastSelectedTag.classList.add('last-selected');
                this.editor.lastSelectedTag.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    }
    class EditTagCommand extends Command {

		class ReplaceTagsCommand extends Command {
        constructor(editor, oldTags, newTags) {
            super(editor);
            this.oldTags = oldTags;
            this.newTags = newTags;
        }
        execute() {
            this.oldTags.forEach(tag => tag.remove());

            this.oldTags.forEach(tag => fragment.appendChild(tag));

    }
    class MoveCrossEditorCommand extends Command {
        constructor(sourceEditor, targetEditor, movedTags, originalNextSibling) {
            super(targetEditor); 
            this.sourceEditor = sourceEditor;
            this.movedTags = movedTags; 
            this.clonedTags = movedTags.map(tag => tag.cloneNode(true)); 
            this.originalNextSibling = originalNextSibling; 
        }
        execute() {
            this.movedTags.forEach(tag => tag.remove());
			this.sourceEditor.clearSelection();
			this.sourceEditor.checkDuplicates();
            const fragment = document.createDocumentFragment();
            this.clonedTags.forEach(tag => fragment.appendChild(tag));
            this.editor.container.appendChild(fragment);
            this.editor.clearSelection();
            this.clonedTags.forEach(tag => {
                this.editor.selectedTags.add(tag);
                tag.classList.add('selected');

            if (this.clonedTags.length > 0) {

        }
        undo() {
            this.clonedTags.forEach(tag => tag.remove());
			this.editor.clearSelection();
			this.editor.checkDuplicates();
            const fragment = document.createDocumentFragment();
            this.movedTags.forEach(tag => fragment.appendChild(tag));
            this.sourceEditor.container.insertBefore(fragment, this.originalNextSibling);
			this.sourceEditor.clearSelection();
			this.movedTags.forEach(tag => {
				this.sourceEditor.selectedTags.add(tag);
                tag.classList.add('selected');
            });
			if(this.movedTags.length > 0) {
				this.sourceEditor.lastSelectedTag = this.movedTags[this.movedTags.length - 1];

    }
	function highlightTagText(text) {
		if (!text) return '';
		const escapeHTML = (str) => {
			const p = document.createElement("p");
			p.textContent = str;
			return p.innerHTML;
		};
		const regex = /(-?\d+(?:\.\d+)?::)|(::)|([{}[\]])|(artist:|target#|source#|mutual#|rating:|text:)/gi;
		return escapeHTML(text).replace(regex, (match) => {
			const lowerMatch = match.toLowerCase();
			if (match === '{' || match === '}') {
				return `<span class="tag-modifier-red">${match}</span>`;
			}
			if (match === '[' || match === ']') {
				return `<span class="tag-modifier-blue">${match}</span>`;
			}
			if (['artist:', 'target#', 'source#', 'mutual#', 'rating:', 'text:'].includes(lowerMatch)) {
				return `<span class="tag-modifier-yellow">${match}</span>`;
			}
			if (match === '::') {
				 return `<span class="tag-modifier-green">${match}</span>`;
			}
			if (lowerMatch.endsWith('::')) {
				const weight = parseFloat(match);
				if (weight < 1.0) {
					return `<span class="tag-modifier-blue">${match}</span>`;
				} else if (weight > 1.0) {
					return `<span class="tag-modifier-red">${match}</span>`;
				} else { 
					return `<span class="tag-modifier-green">${match}</span>`;
				}
			}
			return match; 
		});
	}
	function parseTagWeight(tagText) {
		let match = tagText.match(/^(-?\d+(?:\.\d+)?)::(.*?)(::)?$/);
		if (match) {
			return {
				weight: parseFloat(match[1]),
				coreTag: match[2].trim(),
				hasTrailingColons: !!match[3],
				isPlainTag: false 
			};
		}
		match = tagText.match(/^(.*?)::$/);
		if (match) {
			return {
				weight: 1.0,
				coreTag: match[1].trim(),
				hasTrailingColons: true,
				isPlainTag: false 
			};
		}
		return {
			weight: 1.0,
			coreTag: tagText.trim(),
			hasTrailingColons: false,
			isPlainTag: true 
		};
	}
	function updateTag(tagElement, rawText) {
		tagElement.innerHTML = highlightTagText(rawText);
		tagElement.dataset.rawText = rawText;
	}
    class PromptEditor {
        constructor(element) {
			this.history = new HistoryManager(this);
            this.container = element;
            this.selectedTags = new Set();
            this.lastSelectedTag = null;
			this.selectionAnchor = null;
            this.container.addEventListener('click', this.handleClick.bind(this));
			this.container.addEventListener('dblclick', (e) => {
				const tag = e.target.closest('.tag');
				if (tag) {
					e.preventDefault(); 
					this.editTag(tag);
				}
			});
            this.container.addEventListener('keydown', this.handleKeyDown.bind(this));
            this.container.addEventListener('paste', this.handlePaste.bind(this));
            this.container.addEventListener('copy', this.handleCopy.bind(this));
            this.container.addEventListener('cut', this.handleCut.bind(this));
		const promptWindow = this.container.closest('.prompt-window');
		if (promptWindow) {
			promptWindow.addEventListener('dragenter', (e) => {
				e.preventDefault();
				e.stopPropagation();
				const isExternalDrag = Array.from(e.dataTransfer.types).some(type => type !== 'text/plain');
				if (isExternalDrag && globalDraggedInfo) {
					if (globalDraggedInfo.sourceEditor && globalDraggedInfo.draggedTags) {
						globalDraggedInfo.draggedTags.forEach(tag => {
							if (tag.parentNode) tag.classList.remove('ghost');
						});
					}
					globalDraggedInfo = null;
				}
				if (!globalDraggedInfo || globalDraggedInfo.sourceEditor !== this) {
					promptWindow.classList.add('drag-over');
				}
			});
			promptWindow.addEventListener('dragleave', (e) => {
				if (promptWindow.contains(e.relatedTarget)) return;
				e.preventDefault();
				e.stopPropagation();
				promptWindow.classList.remove('drag-over');
				promptWindow.querySelector('.drag-action-overlay').innerHTML = '';
				this.indicator.style.display = 'none';
			});
			promptWindow.addEventListener('dragover', (e) => {
				e.preventDefault();
				e.stopPropagation();
				const overlay = promptWindow.querySelector('.drag-action-overlay');
				const rect = promptWindow.getBoundingClientRect();
				const dropX = e.clientX;
				if (globalDraggedInfo && globalDraggedInfo.sourceEditor !== this) {
					overlay.innerHTML = `<span>мқҙлҸҷ</span><span>м¶”к°Җ</span><span>көҗмІҙ</span>`;
					const oneThirdWidth = rect.width / 3;
					const leftBoundary = rect.left + oneThirdWidth;
					const rightBoundary = rect.left + 2 * oneThirdWidth;
					overlay.querySelectorAll('span').forEach(span => span.classList.remove('highlighted'));
					if (dropX < leftBoundary) {
						overlay.children[0].classList.add('highlighted');
					} else if (dropX >= rightBoundary) {
						overlay.children[2].classList.add('highlighted');
					} else {
						overlay.children[1].classList.add('highlighted');
					}

			while (nextEl && nextEl.classList.contains('ghost')) {

    const container = document.getElementById('autocomplete-container');
    if (container.style.display === 'none') return;
    const items = Array.from(container.querySelectorAll('.autocomplete-item'));
    if (items.length === 0) return;
    let activeIndex = items.findIndex(s => s.classList.contains('active'));
    if (activeIndex !== -1) {
        items[activeIndex].classList.remove('active');
    }
    if (key === 'ArrowDown') {
        activeIndex = (activeIndex + 1) % items.length;
    } else if (key === 'ArrowUp') {
        activeIndex = (activeIndex - 1 + items.length) % items.length;
    }
    items[activeIndex].classList.add('active');
    items[activeIndex].scrollIntoView({ block: 'nearest' });

    if (count >= 1000) return Math.floor(count / 1000) + 'K';

				const url = new URL(droppedText);

			const promptEditors = paneElement.querySelectorAll('.prompt-window:not(.excluded) .prompt-editor');
			promptEditors.forEach(editor => {
				const tags = editor.querySelectorAll('.tag');
				const tagTexts = Array.from(tags).map(t => t.textContent);
				if (tagTexts.length > 0) {
					allPromptsText.push(tagTexts.join(', '));
				}
			});
			const final_text = allPromptsText.reduce((fullString, currentPrompt) => {
				if (fullString === '') {
					return currentPrompt;
				}
				if (fullString.trim().endsWith(',')) {
					return fullString.trim() + ' ' + currentPrompt;
				} else {
					return fullString + ', ' + currentPrompt;
				}
			}, '');
			if (final_text) {
				navigator.clipboard.writeText(final_text).then(() => {
					copyAllBtn.textContent = 'ліөмӮ¬лҗЁ!';
					copyAllBtn.classList.add('copied'); 
					copyAllBtn._copyTimeoutId = setTimeout(() => {

					</div>
				<div class="toolbar-button-group">
					<button class="open-wiki-btn" title="мң„нӮӨ м—ҙкё°&#10;Ctrl+Enter"><i class="fa-solid fa-question"></i></button>
				</div>
				</div>
				<div class="toolbar-right-group">
					<button class="copy-all-btn">м „мІҙліөмӮ¬</button>
				</div>
			</div>
			<div class="prompt-editors-container">
				<div class="prompt-window">
					<div class="prompt-title-bar">
						<button class="toggle-include-btn" title="м „мІҙліөмӮ¬ нҸ¬н•Ё/м ңмҷё"><i class="fa-solid"></i></button>
						<div class="prompt-title" contenteditable="true" spellcheck="false">${initialPromptTitle}</div>
						<div class="prompt-controls">
							<button class="copy-prompt-btn" title="ліөмӮ¬"><i class="fa-regular fa-clone"></i></button>
							<button class="copy-to-other-column-btn" title="л°ҳлҢҖнҺёмңјлЎң ліөмӮ¬"><i class="fa-solid fa-arrow-right"></i></button>
							<button class="move-up-btn" title="мң„лЎң мқҙлҸҷ"><i class="fa-solid fa-arrow-up"></i></button>
							<button class="move-down-btn" title="м•„лһҳлЎң мқҙлҸҷ"><i class="fa-solid fa-arrow-down"></i></button>
							<button class="delete-editor-btn" title="мӮӯм ң"><i class="fa-solid fa-xmark"></i></button>
						</div>
					</div>
					<div class="drag-action-overlay"></div>
					<div class="prompt-editor" tabindex="0"></div>
				</div>
			</div>
		`;
		setupTabPane(newPane);
		new PromptEditor(newPane.querySelector('.prompt-editor'));
		return newPane;
	}
	function addNewTab(name, activateInColumn = null) {
		const newTabId = `tab-${nextTabId++}`;
		const newTabName = name || `н”„лЎ¬н”„нҠё нғӯ ${nextTabId - 1}`;
		globalTabs.push({ id: newTabId, name: newTabName });
		tabPanes[newTabId] = createNewTabPane(newTabId, newTabName);
		updateAllSelectors();
		if (activateInColumn) {
			switchToTab(activateInColumn, newTabId);
		}
	}
	function renderSelector(columnElement) {
		const selectorList = columnElement.querySelector('.tab-selector-list');
		selectorList.innerHTML = '';
		const isLeft = columnElement.classList.contains('left-column');
		const sortState = isLeft ? leftSortState : rightSortState;
		const thisColumnActiveTabId = isLeft ? activeLeftTabId : activeRightTabId;
		const otherColumnActiveTabId = isLeft ? activeRightTabId : activeLeftTabId;
		const searchInput = isLeft ? document.getElementById('left-tab-search-input') : document.getElementById('right-tab-search-input');
		const searchTerm = searchInput.value.trim().toLowerCase();
		let filteredTabs = globalTabs.filter(tab => {
			return tab.name.toLowerCase().includes(searchTerm);
		});
		let tabsToSort = filteredTabs.map(tab => {
			const pane = tabPanes[tab.id];
			return {
				...tab, 
				tagCount: pane ? pane.querySelectorAll('.tag').length : 0
			};
		});
		tabsToSort.sort((a, b) => {
			let comparison = 0;
			if (sortState.by === 'name') {
				comparison = a.name.localeCompare(b.name, 'ko-KR');
			} else { 
				comparison = a.tagCount - b.tagCount;
			}
			return sortState.order === 'asc' ? comparison : -comparison;
		});
		tabsToSort.forEach(tabInfo => {
			const item = document.createElement('div');
			item.className = 'tab-selector-item';
			item.dataset.tabId = tabInfo.id;
			if (tabInfo.id === thisColumnActiveTabId) {
                item.classList.add('active-in-column');
            }
			const namePart = `<span class="tab-item-name-text">${tabInfo.name}</span>`;
			const countPart = `<span class="tab-item-tag-count">[${tabInfo.tagCount}]</span>`;
			let statusPart = '';
			if (tabInfo.id === otherColumnActiveTabId) {
				statusPart = ` <span class="tab-item-status-text">(мӮ¬мҡ© мӨ‘)</span>`;
				item.style.color = '#777';
			}
			item.innerHTML = `
				<span class="tab-selector-item-name">
					${namePart} ${countPart}${statusPart}
				</span>
				<div class="tab-selector-item-controls">
					<button class="rename-tab-btn" title="мқҙлҰ„ л°”кҫёкё°"><i class="fa-solid fa-pencil"></i></button>
					<button class="duplicate-tab-btn" title="ліөм ң"><i class="fa-solid fa-clone"></i></button>
					<button class="delete-tab-btn" title="мӮӯм ң"><i class="fa-solid fa-xmark"></i></button>
				</div>
			`;
			selectorList.appendChild(item);
		});
	}
	function updateAllSelectors() {
		renderSelector(document.querySelector('.left-column'));
		renderSelector(document.querySelector('.right-column'));
	}
	function switchToTab(columnElement, tabId) {
		const isLeft = columnElement.classList.contains('left-column');
		const otherColumnActiveTabId = isLeft ? activeRightTabId : activeLeftTabId;
		if (tabId === otherColumnActiveTabId) {
			return;
		}
		if (isLeft) {
			activeLeftTabId = tabId;
		} else {
			activeRightTabId = tabId;
		}
		const contentWrapper = columnElement.querySelector('.tab-content-wrapper');
		Array.from(contentWrapper.querySelectorAll('.tab-pane')).forEach(p => {
			p.classList.remove('active');
			p.style.display = 'none';
		});
		const targetPane = tabPanes[tabId];
		const mainTabButton = columnElement.querySelector('.main-tab-btn');
		const tabInfo = globalTabs.find(t => t.id === tabId);
		if (targetPane && tabInfo) {
			if (!contentWrapper.contains(targetPane)) {
				contentWrapper.appendChild(targetPane);
			}
			targetPane.classList.add('active');
			targetPane.style.display = 'flex';
			mainTabButton.querySelector('.tab-button-text').textContent = tabInfo.name;
			mainTabButton.dataset.tabTarget = `#pane-${tabId}`;
			const copyBtns = targetPane.querySelectorAll('.copy-to-other-column-btn');
			copyBtns.forEach(btn => {
				btn.innerHTML = isLeft ? '<i class="fa-solid fa-arrow-right"></i>' : '<i class="fa-solid fa-arrow-left"></i>';
				btn.title = 'л°ҳлҢҖнҺёмңјлЎң ліөмӮ¬';
			});
		}
		columnElement.classList.remove('selector-active', 'dictionary-active');
		columnElement.querySelector('.panel').style.display = 'none'; 
		const activePane = columnElement.querySelector('.tab-pane.active');
		if (activePane) activePane.style.display = 'flex';
		updateAllSelectors();
	}
	function initializeColumnTabs(columnElement) {
		const isLeft = columnElement.classList.contains('left-column');
		const tabListBtn = columnElement.querySelector('.tab-list-btn');
		const mainTabButton = columnElement.querySelector('.main-tab-btn');
		const dictToggleBtn = columnElement.querySelector('.dict-toggle-btn');
		const selectorPanel = columnElement.querySelector('.panel');
		const contentWrapper = columnElement.querySelector('.tab-content-wrapper');
		const closeActiveDictionary = () => {
			if (!activeDictionaryColumn) return; 
			const previouslyActiveColumn = activeDictionaryColumn;
			const dictPanel = document.getElementById('tag-dictionary-panel');
			previouslyActiveColumn.classList.remove('dictionary-active');
			document.body.appendChild(dictPanel);
			dictPanel.style.display = 'none';
			const activePane = previouslyActiveColumn.querySelector('.tab-pane.active');
			if (activePane) {
				activePane.style.display = 'flex';
			}
			activeDictionaryColumn = null;
		};
		const showView = (viewName) => {
			const dictPanel = document.getElementById('tag-dictionary-panel');
			if (viewName === 'dictionary') {
				if (activeDictionaryColumn && activeDictionaryColumn !== columnElement) {
					closeActiveDictionary();
				}
			} else {
				if (columnElement.classList.contains('dictionary-active')) {
					closeActiveDictionary();
				}
			}
			columnElement.classList.remove('selector-active', 'dictionary-active');
			selectorPanel.style.display = 'none';
			columnElement.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
			switch(viewName) {
				case 'selector':
					renderSelector(columnElement);
					selectorPanel.style.display = 'flex';
					columnElement.classList.add('selector-active');
					break;
				case 'dictionary':
					contentWrapper.appendChild(dictPanel);
					dictPanel.style.display = 'flex';
					columnElement.classList.add('dictionary-active');
					activeDictionaryColumn = columnElement;
					break;
				case 'prompt':
				default:
					const activePane = columnElement.querySelector('.tab-pane.active');
					if (activePane) activePane.style.display = 'flex';
					break;
			}
		};
		tabListBtn.addEventListener('click', () => showView('selector'));
		mainTabButton.addEventListener('click', () => showView('prompt'));
		dictToggleBtn.addEventListener('click', () => showView('dictionary'));
		const selectorList = columnElement.querySelector('.tab-selector-list');
		const addTabBtn = columnElement.querySelector('.add-left-tab-btn, .add-right-tab-btn');
		const sortDisplayBtn = columnElement.querySelector('.sort-display-btn');
		const sortOptionsBtn = columnElement.querySelector('.sort-options-btn');
		const sortDropdown = columnElement.querySelector('.sort-dropdown-menu');
		function updateSortDisplay() {
			const sortState = isLeft ? leftSortState : rightSortState;
			const sortByName = sortState.by === 'name' ? 'мқҙлҰ„' : 'нғңк·ё мҲҳ';
			const sortOrderArrow = sortState.order === 'asc' ? 'в–І' : 'в–ј';
			sortDisplayBtn.textContent = `${sortByName}${sortOrderArrow}`;
		}
		sortDisplayBtn.addEventListener('click', () => {
			const sortState = isLeft ? leftSortState : rightSortState;
			sortState.order = sortState.order === 'asc' ? 'desc' : 'asc';
			updateSortDisplay();
			renderSelector(columnElement);
			requestSave();
		});
		sortOptionsBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			sortDropdown.style.display = sortDropdown.style.display === 'block' ? 'none' : 'block';
		});
		document.addEventListener('click', (e) => {
			if (!sortOptionsBtn.contains(e.target) && !sortDropdown.contains(e.target)) {
				sortDropdown.style.display = 'none';
			}
		});
		sortDropdown.addEventListener('click', (e) => {
			if (e.target.tagName === 'BUTTON') {
				const sortBy = e.target.dataset.sortBy;
				const sortState = isLeft ? leftSortState : rightSortState;
				sortState.by = sortBy;
				sortState.order = 'asc';
				updateSortDisplay();
				renderSelector(columnElement);
				sortDropdown.style.display = 'none';
				requestSave();
			}
		});
		updateSortDisplay();
		const searchInput = isLeft ? document.getElementById('left-tab-search-input') : document.getElementById('right-tab-search-input');
		searchInput.addEventListener('input', () => renderSelector(columnElement));
		searchInput.addEventListener('keydown', (e) => {
			if (e.key === 'Escape') {
				e.preventDefault();
				searchInput.value = '';
				renderSelector(columnElement);
			}
		});
		addTabBtn.addEventListener('click', () => {
			addNewTab(null, columnElement);
			requestSave();
		});
		selectorList.addEventListener('click', (e) => {
			const item = e.target.closest('.tab-selector-item');
			if (!item) return;
			const tabId = item.dataset.tabId;
			const tabInfo = globalTabs.find(t => t.id === tabId);
			if (e.target.closest('.rename-tab-btn')) {
				const newName = prompt('мғҲ нғӯ мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”:', tabInfo.name);
				if (newName && newName.trim() !== '') {
					tabInfo.name = newName.trim();
					if (activeLeftTabId === tabId) {
						document.querySelector('.left-column .tab-button-text').textContent = newName;
					}
					if (activeRightTabId === tabId) {
						document.querySelector('.right-column .tab-button-text').textContent = newName;
					}
					updateAllSelectors();
					requestSave();
				}
			} else if (e.target.closest('.duplicate-tab-btn')) {
				const sourcePane = tabPanes[tabId];
				if (!sourcePane) return;
				let baseName = `${tabInfo.name} - ліөмӮ¬ліё`;
				let newTabName = baseName;
				let counter = 2;
				while (globalTabs.some(t => t.name === newTabName)) {
					newTabName = `${baseName} (${counter++})`;
				}
				const newTabId = `tab-${nextTabId++}`;
				const newPane = sourcePane.cloneNode(true);
				newPane.id = `pane-${newTabId}`;
				setupTabPane(newPane); 
				newPane.querySelectorAll('.prompt-editor').forEach(editorEl => {
					new PromptEditor(editorEl);
				});
				globalTabs.push({ id: newTabId, name: newTabName });
				tabPanes[newTabId] = newPane;
				updateAllSelectors();
				requestSave();
			} else if (e.target.closest('.delete-tab-btn')) {
				if (globalTabs.length <= 1) {
					alert('л§Ҳм§Җл§ү нғӯмқҖ мӮӯм ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
					return;
				}
				if (confirm(`'${tabInfo.name}' нғӯмқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?`)) {
					globalTabs = globalTabs.filter(t => t.id !== tabId);
					if (tabPanes[tabId]) {
						tabPanes[tabId].remove();
						delete tabPanes[tabId];
					}
					const leftColumnEl = document.querySelector('.left-column');
					const rightColumnEl = document.querySelector('.right-column');
					if (activeLeftTabId === tabId) {
						const fallbackTab = globalTabs.find(t => t.id !== activeRightTabId) || globalTabs[0];
						switchToTab(leftColumnEl, fallbackTab.id);
					}
					if (activeRightTabId === tabId) {
						const fallbackTab = globalTabs.find(t => t.id !== activeLeftTabId) || globalTabs[0];
						switchToTab(rightColumnEl, fallbackTab.id);
					}
					updateAllSelectors();
					requestSave(); 
				}
			} else {
				switchToTab(columnElement, tabId);
				requestSave(); 
			}
		});
	}
function initializeTagDictionaryUI() {
    const topCategoriesContainer = document.getElementById('dict-top-categories');
    if (!topCategoriesContainer) return;
    topCategoriesContainer.innerHTML = '';
    document.getElementById('dict-sub-categories').innerHTML = '';
    document.getElementById('dict-tag-list').innerHTML = '';
    const topCategories = Object.keys(tagDictionary);
    topCategories.forEach(catName => {
        const btn = document.createElement('button');
        btn.className = 'dict-category-btn';
        btn.textContent = catName;
        btn.addEventListener('click', () => {
            topCategoriesContainer.querySelector('.active')?.classList.remove('active');
            btn.classList.add('active');
            renderSubCategories(catName);
            renderTagList(catName, null); 
        });
        topCategoriesContainer.appendChild(btn);
    });
}
function renderSubCategories(topCategory) {
    const subCategoriesContainer = document.getElementById('dict-sub-categories');
    subCategoriesContainer.innerHTML = '';
    const subCategories = Object.keys(tagDictionary[topCategory]);
    subCategories.forEach(subCatName => {
        const btn = document.createElement('button');
        btn.className = 'dict-category-btn';
        btn.textContent = subCatName;
        btn.addEventListener('click', () => {
            subCategoriesContainer.querySelector('.active')?.classList.remove('active');
            btn.classList.add('active');
            renderTagList(topCategory, subCatName); 
        });
        subCategoriesContainer.appendChild(btn);
    });
}
function renderTagList(topCategory, subCategory) {
    const tagListContainer = document.getElementById('dict-tag-list');
    tagListContainer.innerHTML = '';
    let tagsToShow = {};
    if (subCategory) {
        tagsToShow = tagDictionary[topCategory][subCategory];
    } else {
        Object.values(tagDictionary[topCategory]).forEach(subCatTags => {
            Object.assign(tagsToShow, subCatTags);
        });
    }
    const sortedTags = Object.entries(tagsToShow).sort((a, b) => a[0].localeCompare(b[0]));
    sortedTags.forEach(([tag, translation]) => {
        const item = document.createElement('div');
        item.className = 'dict-tag-item';
        item.draggable = true; 
        item.dataset.tagName = tag; 
        item.innerHTML = `<span class="tag-en">${tag}</span><span class="tag-ko">${translation}</span>`;
        item.addEventListener('click', (e) => {
            if (e.ctrlKey) {
                navigator.clipboard.writeText(item.dataset.tagName).then(() => {
                    item.style.backgroundColor = 'var(--highlight-color)';
                    setTimeout(() => { item.style.backgroundColor = ''; }, 200);
                });
                return; 
            }
            if (!activeDictionaryColumn) return;
            const isLeft = activeDictionaryColumn.classList.contains('left-column');
            const targetColumnSelector = isLeft ? '.right-column' : '.left-column';
            const targetColumn = document.querySelector(targetColumnSelector);
            if (!targetColumn) return;
            const focusedWindow = targetColumn.querySelector('.prompt-window:focus-within');
            if (!focusedWindow) {
                alert('нғңк·ёлҘј м¶”к°Җн•  н”„лЎ¬н”„нҠё м°Ҫмқ„ м„ нғқн•ҙмЈјм„ёмҡ”.');
                return;
            }
            const targetEditor = focusedWindow.querySelector('.prompt-editor').promptEditorInstance;
            if (!targetEditor) {
                console.error("н•ҙлӢ№ н”„лЎ¬н”„нҠё м°Ҫмқҳ м—җл””н„° мқёмҠӨн„ҙмҠӨлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.");
                return;
            }
            const newTag = document.createElement('span');
            newTag.className = 'tag';
            updateTag(newTag, item.dataset.tagName); 
            newTag.draggable = true;
            const insertBeforeElement = (targetEditor.lastSelectedTag) 
                ? targetEditor.lastSelectedTag.nextElementSibling 
                : null;
            const command = new CreateTagsCommand(targetEditor, newTag, insertBeforeElement);
            targetEditor.history.execute(command);
        });
        item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', item.dataset.tagName);
            e.dataTransfer.effectAllowed = 'copy';
        });
        tagListContainer.appendChild(item);
    });
}
