name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-preflight:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout complete release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify release version and immutable tag name
        run: node scripts/verify-release-version.mjs --tag "$GITHUB_REF_NAME"

      - name: Verify tagged commit belongs to main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
            echo "::error::Release tag must point to a commit already contained in main"
            exit 1
          }

  desktop:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            tagger_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            tagger_target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: ''
            tagger_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller fastapi uvicorn pillow numpy onnxruntime pandas huggingface_hub rembg tqdm python-multipart

      - name: Build Tagger Server (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri/python
        run: |
          pyinstaller tagger_server.spec --clean --noconfirm
          mkdir -p ../binaries
          mv dist/tagger-server-x86_64-pc-windows-msvc.exe ../binaries/

      - name: Build Tagger Server (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri/python
        run: |
          pyinstaller --onefile --name "tagger-server-${{ matrix.tagger_target }}" tagger_server.py --clean --noconfirm
          mkdir -p ../binaries
          mv "dist/tagger-server-${{ matrix.tagger_target }}" ../binaries/
          chmod +x "../binaries/tagger-server-${{ matrix.tagger_target }}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NAIS2 ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: desktop
    permissions:
      contents: write
    uses: ./.github/workflows/android.yml
    with:
      release: true
