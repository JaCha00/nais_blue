name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  desktop:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            tagger_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            tagger_target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: ''
            tagger_target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller fastapi uvicorn pillow numpy onnxruntime pandas huggingface_hub rembg tqdm python-multipart

      - name: Build Tagger Server (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri/python
        run: |
          pyinstaller tagger_server.spec --clean --noconfirm
          mkdir -p ../binaries
          mv dist/tagger-server-x86_64-pc-windows-msvc.exe ../binaries/

      - name: Build Tagger Server (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri/python
        run: |
          pyinstaller --onefile --name "tagger-server-${{ matrix.tagger_target }}" tagger_server.py --clean --noconfirm
          mkdir -p ../binaries
          mv "dist/tagger-server-${{ matrix.tagger_target }}" ../binaries/
          chmod +x "../binaries/tagger-server-${{ matrix.tagger_target }}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Vite inlines these at build time into the JS bundle. Marketplace
          # features depend on them; without these secrets the app falls back
          # to inert Supabase client (see src/lib/supabase.ts).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'NAIS2 ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: desktop
    permissions:
      contents: write
    uses: ./.github/workflows/android.yml
    with:
      release: true
    secrets:
      ANDROID_KEY_BASE64: ${{ secrets.NAIS_KEYSTORE_BASE64 }}
      ANDROID_KEY_PASSWORD: ${{ secrets.NAIS_KEYSTORE_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
